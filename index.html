<!DOCTYPE html>

    <style>
        :root { --primary-color: #8b0000; --bg-color: #f4f4f4; --card-bg: #ffffff; }

    <script>
        const myBook = [
                      { id: 0, title: "<h1>መእተዊ: መንነትና<h1/>", text: `<h3>ኦርቶዶክሳዊት ተዋህዶ ቤተ ክርስቲያን ካብቶም ናይ ጥንቲ ሃዋርያት ሒዛቶ ዝመጸት ጥንታዊት ቤት እያ ።                 ንሕና ኦርቶዶክሳውያን ተዋህዶ እታ ካብ ጥንቲ ካብ ዘመነ ሃዋርያት ጀሚራ እምነታን ስርዓታን ከይቀየረት ሒዛታ ዘላ ሓቀኛ መርከብ ድሕነት ኢና እምነትና ኣብ እየሱስ ክርስቶስ ጥራይ ዝተመስረተ ኮይኑ ኩሉ ኣገልግሎትና ድማ ንዕኡ ማእከል ዝገበረ እዩ ኣብ ቤት ኣምላኽ ዘለዉ ኣሕዋትና ዲያቆናት ኣቦታትና ካህናት ጳጳሳት ፈለስቲ ባሕታውያን ኩሎም ብሓባር ንክርስቶስ ጥራይ ንምግልጋልን መንግስቱ ንምስፋሕን ዝተወፈዩ እዮም.  ቤተክርስትያናትናን ገዳማትናን ድማ እቲ ሰማያዊ ኣምልኮ ኣብ ምድሪ ዝፍጸመሉ ቅዱስ ቦታታት እዮም ።

ስርዓት ቅዳሴና እቲ እየሱስ ክርስቶስ ባዕሉ ዝሰረቶን ሃዋርያት ዘረከቡናን ኮይኑ ምስ ኣምላኽ ሓደ እንኾነሉ ሰማያዊ ምስጢር እዩ ጾምና ንስጋና ንምግዛእ ንመንፈስና ድማ ንምሕያል ንእየሱስ ክርስቶስ ኣርኣያ ብምግባር ዝፍጸም እዩ መዝሙራትና ንኣምላኽና ንምምስጋንን ታኣምራቱ ንምዝካርን ብቅዱስ ዜማ ዝቐርብ ምስጋና እዩ ጥምቀትና ብሞትን ትንሳኤን እየሱስ ክርስቶስ ምስኡ ሓደ ንኸውነሉን ውሉድነት ኣምላኽ እንረኽበሉን መእተዊ ደገ እዩ ቁርባንና ሓቀኛ ስጋን ደምን እየሱስ ክርስቶስ ኮይኑ ንዘለዓለም ህይወት ዝወሃብ ሰማያዊ መግቢ እዩ ንስሓና ብስልጣን እየሱስ ክርስቶስ ካብ ማእሰርቲ ሓጢኣት እንፈትሓሉ ጸጋ እዩ ፍትሓትና ድማ ነታ ካብ ስጋ ዝተፈለየት ነፍሲ ብምሕረት እየሱስ ክርስቶስ ናብ ዕረፍቲ ንምስጋር ዝግበር ጸሎት እዩ

ስግደትና ንእየሱስ ክርስቶስ ጥራይ ንምምላኽን ንዕኡ ዘሎና ፍጹም ትሕትና ንምግላጽን ዝፍጸም እዩ እምነትና እምነት ሓቅን ፍትሕን እያ ቤተ ክርስቲያንና ኣብ ኩሉ ዘመናት ምስ ምድራውያን ሓይልታትን ፖለቲካዊ ጸቕጥታትን እናተቓለሰት እምነታ ከይቀየረት ጸኒዓ ኣላ ኢዳ ንምድራውያን ሓይልታት ኣይሃበትን ብደም ሰማእታት ጸኒዓ ንሓቂ ጥራይ ትምስክር እምነትና ኣብ ዓለት ወይ ኣብ ፖለቲካ ዘይኮነስ ኣብ እየሱስ ክርስቶስ ዝተመስረተ እዩ

ቅዱስ ጳውሎስ ኣብ መልእኽቲ ኤፌሶን ምዕራፍ ኣርባዕተ ጥቕሲ ዓሰርተ ኣርባዕተ ከምዚ ኢሉ ኣጠንቂቑ ኣሎ ብጥበራ ሰብን ብተንኮልን ናብ ስሕተት ንምውሳድ ብዝመጽእ ኩሉ ንፋስ ትምህርቲ ከም ቈልዑ ኣይትንቀሳቐሱን ኣይትደናገሩን እዚ ድማ እቲ ኣብ ኦርቶዶክሳዊት ቤተ ክርስቲያን ዘሎ ሓቂ ሒዝና ንክንጸንዕን ብዝመጽእ ሓድሽ ትምህርቲ ንከይንናወጽን ዝተዋህበና ዓቢ መምርሒ እዩ



እቶም ተጸረርታ ወገናት እምነትና ከም ድሕረት ወይ ከም ስርዓት ሰብ ገይሮም ከነኣእስዋ 
[ እው 'ን ብንዕቀት ክርእይዋ ይፍትኑ ]
ንሕና ግን ኩሉ ኣገልግሎትና ኣብ እየሱስ ክርስቶስ ከም ዝጸንዐ ካብ መጽሓፍ ቅዱስ እናጠቐስና ነረድእ
ኦርቶዶክሳዊት ቤተ ክርስቲያን እታ ጥንታዊት ሃዋርያዊት መገዲ ኮይና ንሓቂ ጥራይ ሒዛ ትነብር ኣላ
ብዘይ እዚ ሰማያዊ ስርዓት እዚ እምነትና መሰረት ኣይምሃለዎን
ስለዚ ኦርቶዶክሳዊት ቤተ ክርስቲያን ነቲ ካብ እየሱስ ክርስቶስ ዝጀመረ ሓቂ ሒዛ ትነብር ኣላ
እቲ ሓቂ ኣብ ውሽጢ እዚ ቅዱስ ስርዓት ተሓቢኡ ኣሎ እሞ ብእምነት ክንሕዞ ይግባእ
ዝኸበርኩም ናይ እግዚኣብሔር ስድራ ኣሕዋትን ኣሓትን 
ኣብዛ ጽሑፍ እዚኣ መበገሲ ጌርና ናብ ቅድስት ቤተ ክርስቲያንና ንቕረብ 
ብእምነትን ብሓይሊ መንፈስ ቅዱስን ተመሊእና ነዚ ንእምነትና ዝሽርሽር ኣሉታውን ቄናንን ትምህርቲ ምንፍቅና ንቃለሶ 
እቶም ሓሰውቲ ነብያት ኢና መምሃራን ኢና ብሃልቲ ጫፍ ሒዞም ክመጹኹም ምዃኖም እናዘከርና ነቲ ብመጽሓፍ ቅዱስ ዝተዋህበና ጭብጢ ሒዝና ክንመጎትን ክንከታዓን ይግባእ 
ነፍስ ወከፍ ኦርቶዶክሳዊ ኣዳም ይኹን ሄዋን ካብ መምሃራን ዝውሃበና ትምህርቲ ከም ተውሳኺ ጌርና ባዕልና ክንነቅሕ ይግባእ   ኩሉና መን ኣሎና ብዘይካኡ  ጓሳይናን ሓብሓቢናን ንሱ ኣምላክ ኣቦታትና ኣምልክ ክርስቶስ ቃሉ ክንፈልጥ ዓቕሊ ጌርና ብምስትውዓልን ብጥበብን  ክንዓቢ ይሓግዘና  .ሃብታማት ክንከውን .ኣብዚ ጊዘ ድልድል ንወለዶታትክ ክንከውን  
በቲ ዓለማዊ ነገር ከይተዓብለልና መንፈሳዊ ህይወትና ክነዕቢ ፍልጠትናን ክብሪ ቤተ ክርስቲያንናን ሓሊውና ክንነብር ኣምላኽ ይሓግዘና 

ኣብ ዝኾነ ይኹን እዋን ካብ መጽሓፍ ቅዱስ ከይንፍለ እምህጸን 
ዘይተረድኣናን ዘይበረሃልናን ነገር ምስ ዘጋጥመና ኣስተውዕልና ክንሓትት ከይነጥፍእ ናብ ጸጋም መገዲ ካብ ምኻድ ንቆጠብ 
ብኣንጻሩ ናብቶም ዓበይቲ መምሃራንናን ኣቦታትናን ቀሪብና ንሕተት 
ኦርቶዶክስ እታ ናይ ሓቂ እምነት እያ 
ንጌጋን ንውድቀትን ንስሓ ኣዳልያ ንውጹዓትን ንድኹማትን ድማ ተስፋ መገዲ ድሕነት እያ 

ሰሎሞን ኣብ መጽሓፈ መክብብ ምዕራፍ ሓደ ጥቕሲ ክልተ ከም ዝበሎ ብዘይ ኣምላኽ ኹሉ ከንቱነት እዩ 
ከንቱነት ከንቱነቱ ኹሉ ከንቱነት እዩ

1. √  መልእኽቲ እብራውያን ምዕራፍ ዓሰርተ ሰለስተ ጥቕሲ ትሽዓተ  ከምዚ ዝብል ንረከብ

            { id: 2, title: "[ምዕራፍ 2 • √ 81 መጻሕፍትና]", text: ` <h3>ብሉይ ኪዳን 46 መጻሕፍቲ፡ ሓድሽ ኪዳን 35 መጻሕፍቲ። ጠቕላላ 81 መጻሕፍቲ ኣለዉና </h3>፡፡ <h4>ኦርቶዶክሳዊት ተዋህዶ ቤተ ክርስቲያን ሰማንያን ሓደን መጽሓፍቲ እትጥቀም ካብ ሃዋርያት ዝተቐበለቶ ጥንታዊ ትውፊት ስለ ዝኾነ እዩ እቲ መጽሓፍ ቅዱስ ንባዕሉ ኣብ ውሽጢ ቤተ ክርስቲያን እዩ ተጻሒፉን ተኣኪቡን እቶም ስሳን ሽዱሽተን ጥራይ ዝጥቀሙ ወገናት ግን ካብቲ ዝነበረ መጽሓፍቲ ኣጉዲሎም እዮም እምበር ንሕና ኣይወሰኽናሉን እዞም ሰማንያን ሓደን መጽሓፍቲ ካብ ጥንቲ ጀሚሮም ኣብ ግእዝን ኣብ ካልኦት ጥንታውያን ቋንቋታትን ዝነበሩ እዮም

እቶም ንሳቶም ዘውጽእዎም መጽሓፍቲ ኣብ ብሉይ ኪዳን ከም እነሆ መጽሓፈ ጦቢት ዮዲት ጥበብ ሰሎሞን ሲራክ ባሩክ መጽሓፈ መቃብያን ሄኖክን ኩፋሌን ይርከብዎም እዚኦም መጽሓፍቲ እዚኦም ኣብቲ ጥንታዊ ናይ ሰብዓ ሊቃናት ትርጉም ዝነበሩ እዮም ንሳቶም ግን እዚኦም ብእብራይስጢ ኣይተረኽቡን ብምባል ኣውጺኦምዎም ይኹን እምበር ሃዋርያት ክሰብኩ ከለዉ ካብዚኦም መጽሓፍቲ እዚኦም እናጠቐሱ ይምህሩ ነበሩ ንኣብነት ወንጌላዊ ይሁዳ ካብ መጽሓፈ ሄኖክ ጠቒሱ ጽሒፉ ኣሎ ይሁዳ ሓደ ዓሰርተ ኣርባዕተ

ታሪኽ ኦርቶዶክስ ካብ መጀመርታ ፍጥረት ኣዳም ዝጅምር እምነት እዩ ስማ ድማ ኦርቶዶክስ ማለት ቅኑዕ ኣምልኮ ማለት እዩ ካብ ቀደም ስማ እታ ሓንቲ ቅድስት ሃዋርያዊት ቤተ ክርስቲያን እያ ንሳ ብጐይታና እየሱስ ክርስቶስ ተመስሪታ ብደሙ ተዓዲጋ እያ መፈጸምታኣ ድማ እየሱስ ክርስቶስ ክሳዕ ዝመጽእ ክትጸንዕ እያ ምኽንያቱ ደገታት ሲኦል ኣይክስዕሩዋን እዮም ተባሂሉላ እዩ ማቴዎስ ዓሰርተ ሽዱሽተ ዓሰርተ ሸሞንተ

ካልኦት ሃይማኖታት ማኣስ ከም ዝተፈጠራ ክንርኢ ከለና
ካቶሊክ ካብ ኦርቶዶክስ ኣብ ዓመት ኣርባዕተ ሚእትን ሓምሳን ሓደን ብምኽንያት ጉባኤ ኬልቄዶን ተፈልዩ ጸኒሑ ድማ ኣብ ዓመት ሓደ ሽሕን ሓምሳን ኣርባዕተን ፈጺሙ ተፈልዩ
ፕሮቴስታንት ድማ ኣብ ዓመት ሓደ ሽሕን ሓሙሽተ ሚእትን ዓሰርተ ሸውዓትን ብማርቲን ሉተር ተጀሚሩ
እቶም ሎሚ ዘለዉ ዝተፈላለዩ ጉጅለታት ድማ ኣብ መበል ዓሰርተ ትሽዓተን ዕስራን ክፍለ ዘመን ዝመጹ እዮም
ኦርቶዶክስ ግን ካብ መዓልቲ ጰራቅሊጦስ ጀሚራ እምነታ ከይቀየረት ዝጸንሐት ናይ መጀመርታ እያ

ኦርቶዶክስ ምስራታ ባዕሉ እየሱስ ክርስቶስ እዩ ስለዚ ንሕና ካብቲ ምንጪ ኣይወጻእናን እቶም ካልኦት ግን ንመጽሓፍ ቅዱስ ኣጉዲሎም ስርዓት ኣቦታት ድማ ንዒቖም ሓድሽ መገዲ ፈጢሮም ንሕና ግን ነቲ ጥንታዊ መገዲ ሒዝና ንኸይድ ኣለና እቲ ሰማንያን ሓደን መጽሓፍቲ ድማ ምልኣት እምነትና ዘርእይ እዩ ሓደ መጽሓፍ እኳ ካብ ቃል ኣምላኽ ክጎድል የብሉን ስለዚ እቲ ሓቀኛ ቃል ኣምላኽ ኣብ ኦርቶዶክስ ምሉእ ኮይኑ ይርከብ

ኣብ መወዳእታ ኦርቶዶክስ መጀመርታኣ ኣብ ገነት እዩ መፈጸምታኣ ድማ ኣብታ ሰማያዊት ዮሩሳሌም እዩ
እዛ ቤተ ክርስቲያን እዚኣ ንኹሉ ዘመናት ሰጊራ ክሳዕ ሎሚ ክትበጽሕ ከላ ብዙሕ መከራ ሓሊፋ እያ
ግን ጐይታ ምሳኣ ስለ ዝኾነ ጸኒዓ ኣላ
ስለዚ በዛ እምነት እዚኣ ንምካሕ ምኽንያቱ ንሕና ኣብታ ሓቀኛ መርከብ ድሕነት ስለ ዘለና
እቶም ንዓና ዝነቅፉ ድማ ነቲ ታሪኽን ሓቅን ስለ ዘይፈለጥዎ እዮም
ንሕና ግን ነቲ ሓቂ ሒዝና ብትሕትና ንመላለስ</h4>`, audio: "Am.mp3", images: ["syn.jpg"] },
            { id: 3, title: "ምዕራፍ 3 • √ ትውፊትን ትርጉሙን]", text: `[ <h4>ብዛዕባ ቅዱስ ትውፊት ክንዛረብ ከለና፡ ንመሰረት እምነትናን ንመጽሓፍ ቅዱስ ባዕሉን ብኸመይ ከም ዝረኸብናዮ ዝገልጽ ኣገዳሲ ትምህርቲ እዩ። ብዙሓት ሰባት ትውፊት ክበሃል ከሎ ከምቲ ጐይታና እየሱስ ክርስቶስ ንፈሪሳውያን "ብትውፊትኩም ቃል ኣምላኽ ትስዕሩ ኣለኹም" (ማቴዎስ ምዕራፍ ዓሰርተ ሓሙሽተ ጥቕሲ ሽዱሽተ) ዝበሎም ጥራይ እዮም ዝዝክሩ። ይኹን እምበር፡ ኣብ መንጎ እቲ ሰባት ዝፈጠሩዎ ሕማቕ ልማድን  ኣብ መንጎ እቲ መንፈስ ቅዱስ ኣብ ቤተ ክርስቲያን ዝመራሕሉ ቅዱስ ትውፊትን  ዓብዪ ፍልልይ ኣሎ። ቅዱስ ትውፊት ማለት እቲ ካብ ጐይታና ዝተረኽበ፡ ብሃዋርያት ዝተሰብከ፡ ብኣቦታት ዝተሓለወን ብመንፈስ ቅዱስ ተመሪሑ ካብ ወለዶ ናብ ወለዶ ዝሰገረ ህያው ቃል ኣምላኽ ማለት እዩ።

ቀዳማይ ክንፈልጦ ዝግባእ ነገር፡ መጽሓፍ ቅዱስ ባዕሉ ውጽኢት ቅዱስ ትውፊት ምዃኑ እዩ። ጐይታና እየሱስ ክርስቶስ ንሃዋርያት ክልእኮም ከሎ "ኪዱ እሞ ንኹሎም ኣህዛብ ብስም ኣቦን ወድን መንፈስ ቅዱስን እናኣጥመቕኩም ደቀ መዛሙርቲ ግበሩዎም" (ማቴዎስ ምዕራፍ ዕስራን ሸሞንተን ጥቕሲ ዓሰርተ ትሽዓተ) እዩ ዝበሎም እምበር፡ "ኪዱ መጽሓፍ ጸሓፉ" ኣይበሎምን። ሃዋርያት ድማ ንኣስታት ዕስራ ዓመታት ወንጌል ዝሰበኹን ቤተ ክርስቲያን ዝተኸሉን ብቓል እምበር ብጽሑፍ ኣይነበረን። እቲ ሓድሽ ኪዳን ተጻሒፉ፡ ተኣኪቡን ተፈልዩን ክሳዕ ዝውዳእ ዓመታት ወሲዱ እዩ። ኣብቲ ግዜ እቲ እምነት ክርስትና ዝሕለወሉ ዝነበረ መገዲ ድማ እቲ ካብ ሃዋርያት ብቓል ዝተቐበሉዎ ትውፊት ጥራይ ነበረ። ስለዚ መጽሓፍ ቅዱስ ኣብ ውሽጢ ትውፊት ዝተረኽበ መዝገብ እምበር፡ ካብ ትውፊት ወጻኢ ዝመጸ ኣይኮነን።

ቅዱስ ጳውሎስ ኣብ መልእኽትታቱ ብዛዕባ ትውፊት ኣገዳሲ ትምህርቲ ሂቡ ኣሎ። ኣብ ካልኣይ መልእኽቲ ተሰሎንቄ ምዕራፍ ክልተ ጥቕሲ ዓሰርተ ሓሙሽተ "ኣቱም ኣሕዋተይ፡ ጽንዑ፡ ነቲ ብቓልና ወይ ብመልእኽትና ዝመሃርናኩም ትውፊት ድማ ሓዙ" ኢሉ ኣዚዙ ኣሎ። እዚ ቃል እዚ ብንጹር ከም ዘርእየና፡ እቲ ሃዋርያት ብመልእኽቲ (ብጽሑፍ) ዝሃቡዎ ትምህርቲ ጥራይ ዘይኮነስ፡ እቲ ብቓል ዝመሃሩዎ ትውፊት እውን ማዕረ ክብሪ ከም ዘለዎን ክሕለው ከም ዝግባእን የረድእ። ከምኡ እውን ኣብ ካልኣይ መልእኽቲ ጢሞቴዎስ ምዕራፍ ክልተ ጥቕሲ ክልተ "ነቲ ኣብ ቅድሚ ብዙሓት መሰኻኽር ካባይ ዝሰማዕካዮ፡ ንሳቶም ድማ ንካልኦት ክምህሩ ንዝበቁ እሙናት ሰባት ሕደገሎም" ብምባል፡ እቲ ትምህርቲ ብመገዲ ትውፊት ካብ ሓደ ናብ ሓደ ክሰግር ከም ዘለዎ የገንዝብ።

ካልእ ክንርእዮ ዝግባእ ነጥቢ፡ መጽሓፍ ቅዱስ ንኹሉ ጐይታ ዝገበሮን ዝመሃሮን ነገራት ከም ዘይሓዘ ባዕሉ ይምስክር እዩ። ወንጌላዊ ዮሃንስ ኣብ ምዕራፍ ዕስራን ሓደን ጥቕሲ ዕስራን ሓሙሽተን "እየሱስ ዝገበሮ ካልእ ብዙሕ ነገር እውን ኣሎ፡ ኩሉ በብሓደ ተጻሒፉ እንተ ዝኸውንሲ፡ ነቲ ዝጽሓፍ መጻሕፍቲ ዓለም እኳ ኣይምጸወሮን ይመስለኒ" ይብል። እዚ ኩሉ ኣብ መጽሓፍ ቅዱስ ዘይተጻሕፈ ትምህርትን ስርዐትን ድማ እዩ ኣብ ውሽጢ ቤተ ክርስቲያን ብትውፊት ተሓሊዉ ዝመጸ። ንኣብነት፡ ብኸመይ ከም እንጽሊ፡ ብኸመይ ከም እንጥመቕ፡ ስርዓተ ቍርባን ብኸመይ ከም ዝፍጸም፡ መዓልቲ ሰንበት ንምንታይ ከም እነኽብር ዝኣመሰሉ ብዙሓት መሰረታዊ ስርዓታት ብሰፊሑ ኣብ መጽሓፍ ቅዱስ ኣይተጻሕፉን፡ ግን ድማ ካብ ሃዋርያት ብተግባርን ብቓልን ተቐቢልናዮም ኢና።

ትውፊት ንመጽሓፍ ቅዱስ ብልክዕ ንክንርድኦ ዝሕግዘና መነጽር እዩ። መጽሓፍ ቅዱስ ዘይተማህሩ ሰባት ንጥፍኣት ርእሶም ክጥውዩዎ ከም ዝኽእሉ ቅዱስ ጴጥሮስ ኣጠንቂቑ ኣሎ (ካልኣይ ጴጥሮስ ምዕራፍ ሰለስተ ጥቕሲ ዓሰርተ ሽዱሽተ)። ሓደ ሰብ ንመጽሓፍ ቅዱስ ብናትካ ውልቃዊ ርድኢት ጥራይ ክትርጉሞ እንተ ፈቲንካ ናብ ዝተፈላለየ ስሕተት ክትበጽሕ ትኽእል ኢኻ። ኣብ ግብሪ ሃዋርያት ምዕራፍ ሸሞንተ ጥቕሲ ሰላሳን ሓደን ዘሎ ታሪኽ ናይቲ ኢትዮጵያዊ  ከም መረዳእታ ክኾነና ይኽእል እዩ። ንሱ መጽሓፍ ነቢይ ኢሳይያስ እናኣንበበ ከሎ ቅዱስ ፊልጶስ "እቲ ተንብቦ ዘለኻስ ተስተውዕሎዶ ኣለኻ?" ኢሉ ሓቲትዎ። እቲ ኢቶጲያዊ ድማ "ሓደ ዝመርሓኒ ከይሃለወስ ከመይ ገይረ ክፈልጦ ይከኣለኒ?" ኢሉ መሊሱሉ። እዚ "መራሒ" ዝበሃል ዘሎ ድማ እታ ዓንዲ ግምቢ ሓቂ ዝኾነት ቤተ ክርስቲያንን (ቀዳማይ ጢሞቴዎስ ምዕራፍ ሰለስተ ጥቕሲ ዓሰርተ ሓሙሽተ) እቲ መንፈስ ቅዱስ ዝዓደላ ትውፊትን እዩ።

ኣብ ብሉይ ኪዳን እውን ትውፊት ዝዓበየ ቦታ ነበሮ። ካብ ኣዳም ጀሚሩ ክሳዕ ሙሴ ዝነበሩ ኣቦታት ቃል ኣምላኽ ዝፈልጡን መስዋእቲ ዘቕርቡን ብትውፊት እዩ ነይሩ። ሙሴ ኦሪት ከይጸሓፈ ከሎ፡ ኣብርሃምን ይስሃቅን ያእቆብን ብዛዕባ ኣምላኽ ዝፈልጡሉን ዝምለኩሉን መገዲ ካብ ኣቦታቶም ብቓል ብዝተቐበሉዎ ትውፊት ነበረ። ስለዚ ትውፊት ማለት መጽሓፍ ቅዱስ ዝጻረር ወይ ዝትክእ ዘይኮነስ፡ ንመጽሓፍ ቅዱስ ዘብርህ፡ ዘመላእ፡ ካብ ስሕተት ዝሕሉን ኣብ ውሽጢ ቤተ ክርስቲያን ዝነብር ህያው መንፈስ ኣምላኽ እዩ። ንሕና ኦርቶዶክሳውያን ትውፊት ክንብል ከለና፡ ነቲ ሃዋርያዊት ቤተ ክርስቲያን ካብ መጀመርታ ሒዛቶ ዝመጸት፡ ብጉባኤታት ዝጸንዐን ብደመ ቅዱሳን ዝተሓለወን እምነት ማለታችን እዩ። እዚ ትውፊት እዚ ድማ እዩ ሓድነት ቤተ ክርስቲያን ዝሕሉን ንመጽሓፍ ቅዱስ ካብ ጌጋ ትርጉም ዘድሕንን ። </h4>።]`, audio: "n.mp3", images:  ["rim.jpg"] },
            { id: 4, title: "[ ምዕራፍ 4 • √ ቅድስት እመ ኣምላክ ድንግል ማርያም ]", text: `[ <h4>ቅድስት ድንግል ማርያም ወላዲተ ኣምላኽ ምዃና እቲ ዝዓበየ ምስጢር ቤተ ክርስቲያን እዩ ትርጉሙ ድማ ኣምላኽ ዝወለደት ማለት እዩ ብዙሓት ወገናት ግን ንዓኣ ከም ዝኾነት ተራ ሰበይቲ ገይሮም ብምንዓቕ ይርእዩዋ ንሳቶም ማርያም ጐይታ ምስ ወለደት ስራሓ ኣብቂዑ እዩ ይብሉ ገሊኦም ድማ ከምቲ ሓደ ደብዳቤ ካብ ኤንቨሎፕ ምስ ወጸ እቲ ኤንቨሎፕ ዋጋ ዘይብሉ ዝኸውን ንሳቶም ድማ ንማርያም ከምኡ ገይሮም ይምስሉዋ እዚ ግን ዓብዪ ጸርፊ እዩ ምክንያቱ ኣምላኽ ዝሓደረሉን ዝተወልደሉን ስጋ ንዘለዓለም ቅዱስ ስለ ዝኾነ ንሳቶም ማርያም ካልኦት ደቅስ ነይሮምዋ እዮም ብምባል ድንግልናኣ ክትንክፉ ይፍትኑ እዚ ድማ ነቲ ጐይታ ብሓቀኛ ስጋ ካብኣ ምውላዱ ንምጽላም ዝግበር ፈተነ እዩ

ድንግል ማርያም ወላዲተ ኣምላኽ ምዃና መጽሓፍ ቅዱስ ብሰፊሑ ይምስክር እዩ ነቢይ ኢሳይያስ እነሆ ድንግል ክትጠንስ ወዲ ድማ ክትወልድ እያ ስሙ ድማ ኣማኑኤል ክበሃል እዩ ኢሉ ተነበየ ኢሳይያስ ሸውዓተ ዓሰርተ ኣርባዕተ ኣማኑኤል ማለት ድማ ኣምላኽ ምሳና ማለት እዩ ስለዚ ድንግል ዝወለደቶ ህጻን ኣምላኽ ስለ ዝኾነ ንሳ ብሓቂ ወላዲተ ኣምላኽ ትበሃል መልኣኽ ቅዱስ ገብርኤል ናብኣ ምስ መጸ ጸጋ ዝመልኣኪ ደስ ይበልኪ እግዚኣብሔር ምሳኺ እዩ ኢሉ ሰላምታ ሂብዋ ሉቃስ ሓደ ዕስራን ሸሞንተ እዚ ድማ ካብ ኩለን ኣንስቲ ፍልይ ዝበለት ምዃና የርእየና ኤልሳቤጥ እውን ብመንፈስ ቅዱስ ተመሊኣ ኣደ ጐይታይ ናባይ ክትመጽእ እዚ ካበይ ኮነለይ ብምባል ማርያም ኣደ ኣምላኽ ምዃና መስኪራ እያ ሉቃስ ሓደ ኣርባዕተን ሰለስተን

ድንግል ማርያም ካብ ሕርሲ ቅድሚኡን ድሕሪኡን ዘለዓለማዊት ድንግል ምዃና ነቢይ ሕዝቅኤል መስኪሩ እዩ እዛ ደገ እዚኣ ተዓጽያ ክትነብር እያ እምበር ኣይክትክፈትን እዩ እግዚኣብሔር ኣምላኽ እስራኤል ብእኣ ኣትዩ እዩ እሞ ተዓጽያ ክትነብር እያ ይብል ሕዝቅኤል ኣርባዕተን ኣርባዕተ ክልተ እዚ ድማ ጐይታ ካብኣ ምስ ተወልደ ማሕጸና ከም ዘይተከፍተን ድሕሪኡ ድማ ንዝኾነ ሰብ ዕጹው ምዃኑን ዘርእይ ምስጢር እዩ ማርያም እታ ቅድስቲ ታቦት እያ እታ መና ዝነበራ ናይ ወርቂ መሶብ እያ እታ ዘይተሓርሰት ግራት እያ እታ ሙሴ ዝረኣያ ኸይነደደት እትነድድ ዝነበረት ቍጥቋጥ እውን ምስሊ ድንግል ማርያም እዩ ምክንያቱ እቲ ዘሕርር መለኮት ኣብ ማሕጸና ጾይራቶ ክሳዕ ክንደይ ቅድስቲ ምዃና የረድኣና

ንሕና ኦርቶዶክሳውያን ንክብሪ ድንግል ማርያም ዝለዓለ ቦታ ንህብ ንሳ ካብ መላእኽቲ ትበልጽ ካብ ኣምላኽ ድማ ትሕት ትብል ንዓኣ እንህቦ ክብሪ ናይ ኣምላኽነት ዘይኮነስ ናይ ክብሪ ስግደት እዩ ካብ ሕጂ ጀሚሩ ኩሉ ወለዶ ብጽእቲ ክብሉኒ እዮም ዝብል ቃላ ሒዝና ኩሉ ግዜ ብጽእቲ ንብላ ብእኣ ኣቢሉ መድሓኒ ዓለም ስለ ዝመጸና ንዓኣ ምምስጋን ንጐይታ ምምስጋን እዩ ኣብ ስርዐተ ኣምልኮና ውዳሴ ማርያምን ቅዳሴ ማርያምን እናበልና ንውድሳ በዓላታ ድማ ብዓብዪ ድምቀት ነኽብር ንሳ ኣብ ቅድሚ ወዳ ኰይና ስለ ዓለም እተማልድ ኣደ እያ ከምቲ ኣብ ቃና ገሊላ ሰብ መርዓ ወይኒ ምስ ተወድኦም ናብ ወዳ ከይዳ ዝለመነትሎም ሎሚ እውን ንዓና ትልምነልና እያ

ድንግል ማርያም እታ ንጽህተ ንጹሃን እያ ኣምላኽ ንዓኣ ዝመረጻ ካብ ኩሉ ፍጥረት ንጽህቲ ስለ ዝረኸባ እዩ ንሳ ወላዲተ ኣምላኽ ምዃና ዝኽሕዱ ወገናት ንመለኮትነት ክርስቶስ እዮም ዝጠራጠሩ ዘለዉ ምክንያቱ ካብ ማርያም ዝተወልደ ህጻን ፍጹም ኣምላኽ እንተ ኾይኑ ንሳ ድማ ብሓቂ ወላዲተ ኣምላኽ እያ ንሕና ድማ ነዛ ቅድስቲ ኣደ እዚኣ እናኣመስገንና ኣብ ጽላላ ተሸፊና ንነብር ኣለና ንሳ እታ ሓቀኛ መሰላል ያእቆብ እያ ብእኣ ኣቢሉ ኣምላኽ ናብ ምድሪ ወሪዱ ንሕና ድማ ናብ ሰማይ ዓሪግና ስለዚ ካኣ ኢና ነክብራ  ንሳ ኣዴናን መመክሒትናን  እያ ።</h5>  
<em> <h4> ብመሰረቱ ድንግል ማርያም ኣምላዲት ቅድሚ ምባልካ ቅድስት ድያ ምሕታት ይቐርብ  ቅዱሳን ከ ከም ዝማልዱ ታኣምን ዲኻ ኢልካ ምሕታት  ድንግል ማርያም ሓንቲ ካብ ቅዱሳን ፍጥረታት እግዚኣብሄር እያ።</h4></em><h4> መጽሓፍ ራእይ ዮሃንስ ምዕራፍ ሽዱሽተ ጥቕሲ ትሽዓተ ክሳዕ ዓሰርተ ሓደ ይርከብ ጎወንጌላዊ ዮሃንስ ነፍሳት እቶም ስለ ቃል ኣምላኽ ዝተሓርዱ ሰማእታት ኣብ ትሕቲ መውቀሪ ኮይኖም ክሳዕ መዓስ ኢኻ ኦ እግዚኣብሄር ቅዱስ ጐይታ ዘይትፈርድ እሞ ደምና ዘይትፈዲ እናበሉ ብዓቢ ድምጺ ክልምኑ ርእዩዎም  እዚ ድማ ሰማእታት ድሕሪ ሞቶም እውን ስለ ዓለም ክልምኑ ከም ዝኽእሉ ዓቢ መርትዖ እዩ</h4> ]`, audio: "  ai.mp3", images: ["a.jpg"] },
            { id: 5, title: " [ ምዕራፍ 5 • √ ድንግል ማርያም ካልእ ውሉድ ኣለውዋ ]", text: `<h4><em>ድንግል ማርያም ብጀካ ጐይታና እየሱስ ክርስቶስ ካልእ ውሉድ የብላን እቶም ንዓኣ ዝነቅፉ ወገናት ግን ካልኦት ደቅስ ነይሮምዋ ይብሉ ነዚ ንምባል ድማ ኣብ ወንጌል ማቴዎስ ምዕራፍ ዓሰርተ ሰለስተ ጥቕሲ ሓምሳን ሓሙሽተን ዘሎ ኣሕዋት ጐይታ ዝብል ቃል ይጠቅሱ ያእቆብ ዮሳ ስምኦን ይሁዳ ተባሂሎም ዝተጸውዑ ኣሕዋቱ እዮም ይብሉ ከምኡ እውን ማቴዎስ ሓደ ዕስራን ሓሙሽተን በኹሪ ወዳ ክሳዕ እትወልድ ኣይፈለጠን ዝብል ቃል ድሕሪኡ ከም ዝፈለጠ የርእይ እዩ ይብሉ በኹሪ ዝብል ቃል ድማ ካልኣይ ኣሎ ማለት እዩ ኢሎም ይከራኸሩ እዚ ግን ንባህሊ እብራውያንን ንቋንቋ መጽሓፍ ቅዱስን ካብ ዘይምርዳእ ዝመጸ እዩ

ቀዳማይ ጭብጢ እቶም ኣሕዋት ጐይታ ተባሂሎም ዘለዉ ሰባት ደቀቦኡ ወይ ኣዝማዱ እዮም ብመሰረት ባህሊ እብራውያን ሓው ዝብል ቃል ንቅርብ ዓሌት እውን የገልግል ነበረ ንኣብነት ኣብርሃም ንሎጥ ሓወይ ኢሉ ጸዊዕዎ ኣሎ ግን ወዲ ሓዉ እዩ ነይሩ ዘፍጥረት ዓሰርተ ሰለስተ ሸሞንተ እቶም ኣብ ወንጌል ኣሕዋት ጐይታ ተባሂሎም ዘለዉ ያእቆብን ዮሳን ኣዲኦም ማርያም ሰበይቲ ቀለዮጳ ምዃና መጽሓፍ ቅዱስ ባዕሉ ይምስክር ማቴዎስ ዕስራን ሸውዓትን ሓምሳን ሽዱሽተን ዮሃንስ ዓሰርተ ትሽዓተ ዕስራን ሓሙሽተን ስለዚ ድንግል ማርያም ካልኦት ደቅስ ኣይነበሩዋን

ካልኣይ ጭብጢ ጐይታ ኣብ መስቀል ከሎ ዝገበሮ ነገር እዩ ጐይታ ኣብ መስቀል ተሰቒሉ ከሎ ንኣዲኡ ንወንጌላዊ ዮሃንስ ሂብዋ ዮሃንስ ዓሰርተ ትሽዓተ ዕስራን ሽዱሽተን እነሃት ኣዴኻ እነሁ ወድኺ ድማ በሎም ድንግል ማርያም ካልኦት ደቅስ እንተዝህልውዋ ጐይታ ንወዲ ዘብዴዎስ ኣይምሃባን ነይሩ ብመሰረት ሕጊ ኣይሁድ ሓንቲ ኣዶ ደቃ እናሃለዉ ናብ ካልእ ሰብ ኣይትውሰድን እያ እዚ ድማ ድንግል ማርያም ካልእ ውሉድ ከም ዘይነበራ ዝዓበየ ምስክር እዩ

ሳልሳይ ጭብጢ ክሳዕ ዝብል ቃል ትርጉም እዩ ክሳዕ ዝብል ቃል ኣብ መጽሓፍ ቅዱስ ኩሉ ግዜ ኩነታት ተቐይሩ ማለት ኣይኮነን ንኣብነት ሚልኮል ጓል ሳኦል ክሳዕ መዓልቲ ሞታ ውሉድ ኣይወለደትን ይብል ካልኣይ ሳሙኤል ሽዱሽተ ዕስራን ሰለስተን እዚ ማለት ድሕሪ ሞታ ወሊዳ ማለት ኣይኮነን ከምኡ እውን ጐይታ ክሳዕ መወዳእታ ዓለም ምሳኻትኩም እየ ኢሉና ኣሎ ማቴዎስ ዕስራን ሸሞንተን ዕስራ እዚ ማለት ድሕሪ መወዳእታ ዓለም ምሳና ኣይከውንን ማለት ኣይኮነን ስለዚ ማርያም ክሳዕ እትወልድ ኣይፈለጠን ማለት ድሕሪኡ ፈሊጥዋ ማለት ኣይኮነን ብንጽህና ዝጸንሐት ዘለዓለማዊት ድንግል እያ

ራብዓይ ጭብጢ በኹሪ ዝብል ቃል ትርጉም እዩ ብመሰረት ሕጊ ሙሴ በኹሪ ማለት ማሕጸን ዝኸፈተ ቀዳማይ ውሉድ ማለት እዩ ካልኦት ደቅስ ክስዕቡ ኣለዎም ማለት ኣይኮነን ኣምላኽ ማሕጸን ዝኸፍት ኩሉ በኹሪ ንኣይ ቀድሶ ኢሉ ኣዚዙ ነበረ ዘጸኣት ዓሰርተ ሰለስተ ክልተ ሓደ ውሉድ በኹሪ ዝበሃል ካልኣይ ምስ ተወልደ ዘይኮነስ ምስ ተወልደ ጥራይ እዩ ስለዚ እየሱስ በኹሪ ተባሂሉ ምጥቃሱ ንሱ እቲ ቀዳማይ ማሕጸን ዝኸፈተ ምዃኑ ንምግላጽ እዩ

ሓሙሻይ ጭብጢ ትንቢት ሕዝቅኤል እዩ ነቢይ ሕዝቅኤል ኣብ ምዕራፍ ኣርባዕተን ኣርባዕተን ጥቕሲ ክልተ እዛ ደገ እዚኣ ተዓጽያ ክትነብር እያ ኣይክትክፈትን እያ ይብል እግዚኣብሔር ኣምላኽ እስራኤል ብእኣ ኣትዩ እዩ እሞ ተዓጽያ ክትነብር እያ እዚ ምስሊ እዚ ንማህጸን ድንግል ማርያም የመልክት ጐይታና እየሱስ ክርስቶስ ብእኣ ኣትዩ ሰብ ኮይኑ ተወሊዱ እዩ ድሕሪኡ ግን ማሕጸና ንካልእ ሰብ ተዓጽዩ ከም ዝነብር እቲ ትንቢት የረጋግጽ ስለዚ ድንግል ማርያም ቅድሚ ሕርሲ ግዜ ሕርሲን ድሕሪ ሕርሲን ድንግል እያ ካብ ጐይታና ወጻኢ ድማ ካልእ ውሉድ የብላን እቶም ካልእ ዝብሉ ግን ቃል ኣምላኽ ብልክዕ ዘይተረድኡ እዮም</em></h4>

<h3> [ √  ብሓፈሻዊ መደምደምታ ]</h3>መጽሓፍ ቅዱስ ንማርያም ከም ፍልይቲ ኣደ ኣምላኽ ጥራይ እዩ ዝገልጻ እቶም ኣሕዋቱ ተባሂሎም ዘለዉ ድማ ኣዝማዱ ምዃኖም ብካልኦት ጥቁሳት ክፍሊታት ወንጌል ምርግጋጽ ይከኣል እዩ ንሳ ወላዲተ ኣምላክ ጥራይ ዘይኮነት ዘለዓለማዊት ድንግል እውን እያ እዚ ድማ እዩ እቲ ኦርቶዶክሳዊ እምነትና ዝምስክሮ ሓቂ </em></h4>`, audio: "mari.mp3 ", images: ["maro.jpg"] },
            { id: 6, title: "[ ምዕራፍ 6 • √ ቅዱሳን ኣየማልዱን እዮም ]", text: `<h4>ኣማላድነት ቅዱሳን ማለት እቶም ንኣምላኽ ብቅድስና ዘገልገሉን ኣብ ቅድሚኡ ሞገስ ዝረኸቡን ቅዱሳን ምእንታና ናብ ኣምላኽ ጸሎት ምቕራብ ማለት እዩ
መጽሓፍ ቅዱስ ብዛዕባ ኣማላድነት ቅዱሳን ብዙሕ ምስክርነት ይህብ እዩ
ኣምላኽ ንባዕሉ ንኣቢሜሌክ ኣብርሃም ነቢይ እዩ እሞ ክጽልየልካ እዩ ክትድሕን ድማ ኢኻ ኢሉዎ እዩ

            { id: 8, title: " [ምዕራ 8• √ ጾም 40 ]", text: ` <h4>ዓቢ ጾም ወይ ጾመ ኣርብዓ ካብቲ እየሱስ ክርስቶስ ባዕሉ ዝጾሞ ጾም እዩ ዝጅምር እየሱስ ክርስቶስ ድሕሪ ጥምቀቱ ናብ በረኻ ወጽዩ ኣርብዓ መዓልትን ኣርብዓ ለይትን ጾይሙ እዩ ማቴዎስ ኣርባዕተ ክልተ እዚ ጾም እዚ ኣብ ኦርቶዶክሳዊት ቤተ ክርስቲያን ሓምሳን ሓሙሽተን መዓልቲ ኮይኑ ይጽወም እዚ ድማ ሾብዓተ ሰሙናት ምስ ሰሙነ ሕማማት ማለት እዩ

            { id: 10, title: "[ √ ምዕራፍ 10: ጥምቀት ]", text: ` [ <h4>ጥምቀት ካብ ዮርዳኖስ እዩ ጀሚሩ እየሱስ ክርስቶስ ብኢድ ዮሃንስ ተጠሚቑ ንዓና ኣብነት ኮይኑና ማቴዎስ ሰለስተ ዓሰርተ ሽዱሽተ እየሱስ ክርስቶስ ንሃዋርያቱ እናኣጥመቕኩም ደቀ መዛሙርቲ ግበሩዎም ኢሉ ኣዚዙ እዩ ማቴዎስ ዕስራን ሸሞንተን ዓሰርተ ትሽዓተ ጥምቀት ምስ ክርስቶስ ሓደ ንኸውነሉን ናይ ኣምላኽ ውሉድነት እንረኽበሉን ቅዱስ ምስጢር እዩ

ጥምቀት ካብ ርኽሰት ሓጢኣት ንምንጻህን ዳግም ንምውላድን የገልግል እየሱስ ክርስቶስ ካብ ማይን ካብ መንፈስን እንተዘይተወልደ መንግስተ ኣምላኽ ክኣቱ ዝኽእል የለን ኢሉ እዩ ዮሃንስ ሰለስተ ሓሙሽተ ስለዚ ጥምቀት ናብ መንግስተ ሰማያት መእተዊ ደገ እዩ ብጥምቀት ኣቢልና ካብቲ ካብ ኣዳም ዝወረስናዮ ሓጢኣት ንጸሪ ኣባላት ስጋ ክርስቶስ ድማ ንኸውን

ኣብ ኦርቶዶክሳዊት ቤተ ክርስቲያን ወዲ ኣርብዓ መዓልቲ ጓል ድማ ሰማንያ መዓልቲ ምስ ኾኑ ይጥመቁ እዚ ስርዓት እዚ መበገሲኡ ካብ ሕጊ ሙሴ ዝመጸ እዩ ዘሌዋውያን ዓሰርተ ክልተ ሓንቲ ኣዶ ወዲ እንተወሊዳ ኣርብዓ መዓልቲ ጓል እንተወሊዳ ድማ ሰማንያ መዓልቲ ካብ መቕደስ ትርሕቕ ነበረት ድሕሪ እቲ መዓልቲ ግን ነቲ ህጻን ሒዛ ናብ ቤተ መቕደስ ትመጽእ እየሱስ ክርስቶስ እውን ብመሰረት እዚ ሕጊ እዚ ኣብ ኣርብዓ መዓልቱ ናብ ቤተ መቕደስ ቀሪቡ እዩ ሉቃስ ክልተ ዕስራን ክልተ ስለዚ ህጻናት በዚ መዓልቲ እዚ ናብ ቤተ ክርስቲያን ቀሪቦም ናይ ኣምላኽ ውሉድነት ይረኽቡ

እቶም ንዓና ዝነቅፉ ወገናት ዝኣመነን ዝተጠምቀን ክድሕን እዩ ዝብል ቃል ይጠቅሱ ህጻናት ከይኣመኑ ንምንታይ ትጥምቁዎም ይብሉ ንሳቶም ጥምቀት ንዓበይቲ ጥራይ እዩ ዝብል ሓሳብ የቕርቡ ይኹን እምበር እዚ ጐይታ ዝበሎ ቃል ነቶም ወንጌል ሰሚዖም ክመጹ ዝግብኦም ዓበይቲ እዩ ህጻናት ግን ብእምነት ወለዶምን ብእምነት ክርስትና ኣቦን እዮም ዝጥመቁ እየሱስ ክርስቶስ ነቲ ሽባ ሰብ ክፈውሶ ከሎ እምነት ናይቶም ዝጾርዎ ሰባት ርእዩ እዩ ሓጢኣቱ ዝሓደገሉ ማርቆስ ክልተ ሓሙሽተ ስለዚ ህጻናት እውን ብእምነት ወለዶም ጸጋ ጥምቀት ይረኽቡ

ጥምቀት ኣብ ሓድሽ ኪዳን ንግዝረት ተኪኡ ዝመጸ እዩ ቈሎሴ ክልተ ዓሰርተ ሓደ ኣብ ብሉይ ኪዳን ህጻናት ኣብ ሻምናይ መዓልቶም ምስ ኣምላኽ ኪዳን ይኣትዉ ነበሩ እቲ ህጻን ተረዲእዎ ወይ ኣሚኑሉ ዘይኮነስ ብእምነት ወለዱ እዩ ዝግዘር ነይሩ ኣብ ጥምቀት እውን ህጻናት ካብ ህጻንነቶም ጀሚሮም ናይ ኣምላኽ ውሉድ ንክኾኑ ይጥመቁ ሃዋርያት እውን ምሉእ ስድራቤት የጥምቁ ነበሩ ግብሪ ሃዋርያት ዓሰርተ ሽዱሽተ ዓሰርተ ሓሙሽተ ስድራቤት ክበሃል ከሎ ድማ ህጻናት የጠቓልል እዩ

የሱስ ክርስቶስ ህጻናት ናባይ ይምጽኡ ኣይትክልክሉዎም ኢሉ እዩ ማቴዎስ ዓሰርተ ትሽዓተ ዓሰርተ ኣርባዕተ ህጻናት ናብ ጐይታ ክመጹ እንተፈቒዱሎም እቲ ናብ መንግስተ ሰማያት መእተዊ ዝኾነ ጥምቀት ከመይ ጌርና ንኸልክሎም ሃዋርያ ጴጥሮስ እውን እቲ ተስፋ ንዓኻትኩምን ንደቅኹምን እዩ ኢሉ ተዛሪቡ እዩ ግብሪ ሃዋርያት ክልተ ሰላሳን ትሽዓተ ስለዚ ጥምቀት ንህጻናት እውን ዝተዋህበ ጸጋ እዩ

            { id: 11, title: "[ ምዕራፍ 11 •√  ብከመይ ንምንታይ ኢና ንቆሩብ ]", text: ` [ <h4>ምስጢረ ቁርባን ጐይታና እየሱስ ክርስቶስ ባዕሉ ዝሰረቶ ናይ ህይወት መገዲ እዩ እዚ ምስጢር እዚ ኣብታ ናይ መወዳእታ ድራር ተጀሚሩ እየሱስ ክርስቶስ ንጎቦ ጎልጎታ ቅድሚ ምኻዱ ምስ ደቀ መዛሙርቱ ኮይኑ እንጌራ ኣልዓለ ባረኸ ፈትፈተ እሞ እዚ ስጋይ እዩ ብልዑ በሎም ጽዋእ ወይኒ ድማ ኣልዓለ ኣመስገነ እሞ እዚ ምእንታኹም ዝፈስስ ደመይ እዩ ስተዩ በሎም ማቴዎስ 26 26 ክሳዕ 28 እዚ ድማ ነቲ ኣብ ብሉይ ኪዳን ዝነበረ ምስሊ ናይ ፋሲካ በጊዕ ናብ ሓቂ ለወጦ

ጥቕሚ ቁርባን ንዘለዓለም ህይወት እዩ እየሱስ ክርስቶስ ስጋይ ዝበልዕ ደመይ ድማ ዝሰቲ ናይ ዘለዓለም ህይወት ኣለዎ ኢሉና ኣሎ ዮሃንስ 6 54 ብቁርባን ኣቢልና ምስ ጐይታ ሓደ ንኸውን ንሱ ድማ ኣባና ይሓድር ቁርባን ንሕድገት ሓጢኣት ይኸውን ንመንፈሳዊ ሓይልና ድማ የሐድስ ብዘይ ቁርባን ኣብ ውሽጥና ህይወት የብልናን ስለዚ ቁርባን ንመግቢ ነፍስና ዝተዋህበ ሰማያዊ መና እዩ

ቅዱስ ጳውሎስ እውን ነዚ ምስጢር እዚ ካብ ጐይታ ከም ዝተቐበሎ ይምስክር 1 ቈረንቶስ 11 23 ሰባት ርእሶም መርሚሮም ካብዚ ስጋን ደምን ክቕበሉ ከም ዝግባእ ኣጠንቂቑ ኣሎ ብዘይ ግቡእ ዝበልዕን ዝሰትን ድማ ኣብ ልዕሊ ርእሱ ፍርዲ ከም ዘምጽእ የረድእ እዚ ድማ ቁርባን ተራ መግቢ ዘይኮነስ ቅዱስ ስጋን ደምን ጐይታ ምዃኑ የረጋግጽ ካብዚ ተካፈልቲ ዝኾኑ ድማ ምስ ጐይታን ምስ ቅዱሳንን ሕብረት ይረኽቡ

እቶም ንዓና ዝነቅፉ ወገናት ቁርባን ምስሊ ወይ መዘከርታ ጥራይ እዩ ይብሉ እቲ እንጌራን ወይኒን ብሓቂ ስጋን ደምን ኣይኸውንን እዩ ኢሎም ይከራኸሩ ንሳቶም እዚ ንመዘከርታይ ግበሩዎ ዝተባህለ ቃል ጥራይ ሒዞም ነቲ ሓቀኛ ምስጢር ይሕስዉዎ ይኹን እምበር የሱስ ክርስቶስ እዚ ስጋይ እዩ እዩ ዝበለ እምበር እዚ ምስሊ ስጋይ እዩ ኣይበለን ስለዚ ንሕና ኦርቶዶክሳውያን ብዘይ ጥርጥር ሓቀኛ ስጋን ደምን ጐይታ ምዃኑ ንኣምን

ቁርባን ማእከል ኣምልኮና እዩ ብዘይ ቁርባን ክርስትና ምልኣት የብሉን ካህን ጸሎተ ቅዳሴ ምስ ፈጸመ እቲ እንጌራን ወይኒን ብሓይሊ መንፈስ ቅዱስ ናብ ስጋን ደምን ጐይታ ይልወጥ ንሕና ድማ ብንስሓ ተዳልውና ንቕበሎ እዚ ድማ እቲ ዝዓበየ ምስጢር ድሕነትና እዩ በዚ ቅዱስ ቍርባን ድማ ካብ ሞት ናብ ህይወት ንሰጋገር ጸጋ ቁርባን ድማ ንኹላትና ይሓልወና                                    
ቁርባን
ብካህን ብቅዱስ ስጋን ክቡር ደምን እየሱስ ክርስቶስ ኣብ ውሽጢ ቤተ ክርስቲያን ድሕሪ ቅዳሴ ይፍጸም እቲ ኣገባብ ድማ ብጥንቃቐን ብፍርህን ብኽብርን ነቲ ሰማያዊ መግቢ ብምቕባል እዩ ቅድሚኡ ጥምቀት ሜሮን ንስሓ ካብ ወጋሕታ ጀሚርካ ጾምን ምስ ኩሉ ሰብ ዕርቅን ክማልእ የድሊ</h4> ]`, audio: " Eru.mp3", images: [" s.jpg"] },
            { id: 12, title: " [ ምዕራፍ 12 •√ ክህነት እንታይ እዩ ]", text: `[ <h4>ምስጢረ ክህነት ማለት ኣምላኽ ንደቂ ሰባት ንምድሓንን ምስጢራተ ቤተ ክርስቲያን ንምፍጻምን ሰባት መሪጹ ስልጣን ዝህበሉ ዓብዪ መንፈሳዊ ኣገልግሎት እዩ እዚ ምስጢር እዚ ካብ ሰብ ዝመጸ ዘይኮነስ ባዕሉ እየሱስ ክርስቶስ ዝሰረቶ እዩ ምስጢር ዝበሃለሉ ምኽንያት ድማ ብኢድ ብምንባር ወይ ብኣንብሮተ እድ ኣቢሉ እቲ ዘይርአ ጸጋ መንፈስ ቅዱስ ኣብቲ ዝሽየም ሰብ ስለ ዝሓድር እዩ

እቲ ምስጢረ ክህነት ዝተጀመረሉ ታሪኽ እየሱስ ክርስቶስ ንሃዋርያቱ ፈሊዩ ክመርጾም ከሎ እዩ እየሱስ ካብቶም ዝሰዓብዎ ብዙሓት ሰባት ንዓሰርተ ክልተ ሃዋርያት ጥራይ መረጸ ማቴዎስ ዓሰርተ ሓደ ብድሕሪኡ ድማ ሰብዓ ደቀ መዛሙርቲ መረጸ እየሱስ ንሃዋርያት ኣብ ምድሪ ዝኣሰርኩምዎ ኩሉ ኣብ ሰማይ እሱር ክኸውን እዩ ኣብ ምድሪ ዝፈታሕኩምዎ ኩሉ ድማ ኣብ ሰማይ ፍቱሕ ክኸውን እዩ ብምባል ፍሉይ ስልጣን ሂብዎም ማቴዎስ ዓሰርተ ሸሞንተ ዓሰርተ ሸሞንተ እዚ ስልጣን እዚ ናይቶም ብፍሉይ ዝተጸውዑ ኣገልገልቲ እምበር ናይ ኩሉ ኣማኒ ኣይኮነን

እቶም ንክህነት ዝነቅፉ ወገናት ብዝተፈላለየ መገዲ ይማጎቱ ንሳቶም ኩላትና ኣመንቲ ካህናት ኢና ስለዚ ፍሉይ ክህነት ኣየድልየናን እዩ ይብሉ ነዚ ንምባል ድማ ንስኻትኩም መንግስቲ ካህናት ኢኹም ዝብል ቃል ይጠቅሱ ቀዳማይ ጴጥሮስ ክልተ ትሽዓተ ንሳቶም ድማ ሓደ ማእከላይ ጥራይ ኣሎ ንሱ ድማ እየሱስ ክርስቶስ እዩ ብምባል ንካህናት ከም ዘየድልዩ ይርእዩዎም ቀዳማይ ጢሞቴዎስ ክልተ ሓሙሽተ ንካህን ሓጢኣትካ ምንጋር ጌጋ እዩ ኣምላኽ ጥራይ እዩ ሓጢኣት ዝሓድግ ዝብል ሞጎት እውን የቕርቡ ከምኡ እውን ኣብ ምድሪ ንሓደ እኳ ኣቦ ኣይትበሉ ዝተባህለ ቃል ሒዞም ንካህናት ኣቦ ምባል ይቃወሙ

ንሕና ኦርቶዶክሳውያን ግን ነዚ ዝስዕብ መልሲ ንህብ ኣብ ብሉይ ኪዳን እውን ኣምላኽ ንህዝቢ እስራኤል ኩላትኩም ካህናት ኢኹም ኢሉዎም ነበረ ዘጸኣት ዓሰርተ ትሽዓተ ሽዱሽተ ይኹን እምበር እቲ ምስጢር ዝፍጽም ክህነት ናይ ኣሮንን ደቁን ጥራይ ነበረ ቆሬ ዳታንን ኣቤሮንን ኩላትና ካህናት ኢና ስለምንታይ ትበልጹና ኢሎም ንስርዓት ክህነት ምስ ተቓወሙ ኣምላኽ ቀጺፉዎም እዩ ዘሁልቁ ዓሰርተ ሽዱሽተ እየሱስ ክርስቶስ እውን ንሃዋርያት ፈሊዩ ስልጣን ሂብዎም እዩ እቲ እየሱስ ዝሃቦም ስልጣን ድማ ብኢድ ምንባር ካብ ሃዋርያት ናብ ኣቦታት እናተሰጋገረ ሎሚ በጺሑ ኣሎ

እየሱስ ክርስቶስ ድማ ኣብ ሓድሽ ኪዳን ነዚ ምስጢር እዚ ኣጽኒዕዎ እዩ
ኣብ ወንጌል ማቴዎስ ምዕራፍ ዓሰርተ ትሽዓተ ጥቕሲ ኣርባዕተ ክሳዕ ሽዱሽተ እየሱስ ክርስቶስ ከምዚ በለ
እቲ ካብ መጀመርታ ዝፈጠሮም ተባዕታይን ኣንስተይትን ገይሩ ፈጠሮም
ስለዚ ሰብ ካብ ኣቦኡን ኣዲኡን ይፍለ ምስ ሰበይቱ ድማ ይለግብ ክልቲኦም ድማ ሓደ ስጋ ይኾኑ
ኣምላኽ ዘጋጠሞስ ሰብ ኣይፍለዮ
እዚ ቃል እዚ መርዓ ብሰማያዊ ሓይሊ ዝእሰር ቅዱስ ኪዳን ምዃኑ የረጋግጽ

እየሱስ ክርስቶስ ኣብ ቃና ገሊላ ኣብ ዝተገብረ መርዓ ተረኺቡ ማይ ናብ ወይኒ ብምልዋጥ ነቲ መርዓ ባረኾ
ወንጌል ዮሃንስ ምዕራፍ ክልተ ጥቕሲ ሓደ ክሳዕ ዓሰርተ ሓደ
እየሱስ ኣብቲ መርዓ ምርካቡ መርዓ ቅዱስ ምዃኑን ብጸሎት ክባረኽ ከም ዝለዎን ዘርእይ ጭብጢ እዩ

እቲ ስርዓት ብኸመይ ይፍጸም

ቀዳማይ ብጸሎት ካህናት ይጅምር
ካህን ነቶም መርዓውቲ ብስም ስላሴ ይባርኾም
እዚ ድማ ነቲ ኣምላኽ ኣብ ገነት ዝሃቦ ቡራኬ የመልክት

እቶም ካልኦት ወገናት መርዓ ሰብኣዊ ስምምዕ ጥራይ እዩ ይብሉ
ንሳቶም ካህን ኣየድልይን እዩ እናበሉ ነቲ ምስጢራዊ ጸጋ የቃልሉዎ
እቲ ኣክሊልን እቲ ዝንበብ ጸሎትን ስርዓት ሰብ እዩ ዝብል ሞጎት የቕርቡ

            { id: 16, title: "[ ምዕራፍ 16 •√ ምስጢረ ሜሮን እምስጢረ   ]", text: ` [<h4> ምስጢረ ሜሮን ሓደ ካብቶም ሾብዓተ ምስጢራተ ቤተ ክርስቲያን ኮይኑ ናይ መንፈስ ቅዱስ ጸጋን ሓይልን እንቕበለሉ ቅዱስ ምስጢር እዩ
እዚ ምስጢር እዚ ምስጢረ ማህተም እውን ይበሃል
ምክንያቱ ሓደ ክርስትያን ብጥምቀት ዳግም ምስ ተወልደ ናይ መንፈስ ቅዱስ ማህተም ወይ ምልክት ስለ ዝግበረሉ እዩ

ኣብ ኦሪት ዘፍጥረት ምዕራፍ ዕስራን ሸሞንተን ጥቕሲ ዓሰርተ ሸሞንተ ኣቦና ያእቆብ ነቲ ተተርኢሱዎ ዝነበረ እምኒ ዘይቲ ብምፍሳስ ቀዲሱዎ

ከምኡ እውን ኣብ ግብሪ ሃዋርያት ምዕራፍ ዓሰርተ ትሽዓተ ጥቕሲ ሽዱሽተ ቅዱስ ጳውሎስ ኣብ ልዕሊ እቶም ሰባት ኢዱ ምስ ኣንበረ መንፈስ ቅዱስ ወረደሎም
ሃዋርያት ነዚ ብኢድ ምንባር ዝውሃብ ዝነበረ ጸጋ ብቅዱስ ቅብኢ ሜሮን ተኪኦምዎ ምክንያቱ ቤተ ክርስቲያን እናሰፍሐት ምስ ከደት ሃዋርያት ኣብ ኩሉ ቦታ ተረኺቦም ኢዶም ከንብሩ ስለ ዘይከኣሉ እዩ

ቅዱስ ጳውሎስ ኣብ ካልኣይ መልእኽቲ ቆረንቶስ ምዕራፍ ሓደ ጥቕሲ ዕስራን ሓደን ክሳዕ ዕስራን ክልተን እቲ ዘጽንዓናን ዝቐብኣናን ኣምላኽ እዩ ንሱ ድማ ማሕተም ገበረልና ናይ መንፈስ ቅዱስ መተሓጃ ድማ ኣብ ልብና ሃበና ኢሉ ጽሒፉ ኣሎ
እዚ ምስጢር እዚ ንክርስትያን ህይወት ሓይልን ጽንዓትን ይህብ
ሓደ ሰብ ብጥምቀት ሓጢኣቱ ምስ ጸረዩ ብሜሮን ድማ መንፈስ ቅዱስ ኣብኡ ሓዲሩ ቤተ መቕደስ ኣምላኽ ይኸውን

እቲ ቅብኢ ሜሮን ስርዓት ሰብ እዩ እምበር መጽሓፍ ቅዱሳዊ ኣይኮነን ዝብል ሓሳብ የቕርቡ
ንሳቶም ነቲ ሃዋርያት ዝገብርዎ ዝነበሩ ኢድ ምንባር ጥራይ እዮም ዝቕበሉ እምበር ነቲ ቤተ ክርስቲያን ዝተኸኣቶ ቅዱስ ቅብኢ ኣይቅበሉዎን እዮም</h4> ]`, audio: "eri ca.mp3", images: ["biet.jpg"] },
            { id: 17, title: "[ ምዕራፍ 17 •√ ገዳማውያን ፈልስቲ  ]", text: ` [<h4> ገዳማውነት ወይ ምንኩስና ኣብ ኦርቶዶክሳዊት ተዋህዶ ቤተ ክርስቲያን ህያው መስዋእቲ ኮይኑ ንኣምላኽ ተባሂሉ ዓለምን ፍትወታን ገዲፍካ ብንጽህናን ብተኣዛዝነትን ምንባር ማለት እዩ
እዚ ስርዓት እዚ ሰብ ዝፈጠሮ ዘይኮነስ መሰረቱ ካብ ቃለ ኣምላኽን ካብ ግብሪ ሃዋርያትን ዝመጸ እዩ።

ንሳቶም ዝብልዎ

ንሳቶም ኣምላኽ ሰብ ክራባሕ እዩ ኣዚዙ እምበር ንበይኑ ክነብር ኣይኣዘዘን እናበሉ የቃልሉዎ
ገዳማውያን ካብ ማሕበረሰብ ተፈልዮም ምንባሮም ንወንጌል ኣይጠቅምን እዩ ዝብል ሓሳብ የቕርቡ

            { id: 19, title: "[ ምዕራፍ 19 •√ ስርዓተ ከበሮ ] ", text: ` [<h4> ከበሮ ኣብ ኦርቶዶክሳዊት ተዋህዶ ቤተ ክርስቲያን ንምስጋና ኣምላኽ ዝተቐደሰ መሳርሒ ኮይኑ፡ ነፍሲ ወከፍ ክፍሉን ቅርጹን ምስ ምስጢረ ስጋዌን ምስ ሕማማት እየሱስ ክርስቶስን ዝተኣሳሰረ ዓሚቝ ትርጉም ኣለዎ።


ቅርጺ ከበሮ  እቲ ሰፊሕን ጸቢብን ወገን

ከበሮ ክልተ ገጽ ኣለዎ፤ ሓደ ወገኑ ሰፊሕ ግፍሕ ዝበለን ክኸውን ከሎ፡ እቲ ካልኣይ ወገኑ ድማ ጸቢብ እዩ።

እቲ ሰፊሕ ወገን  ንሓድሽ ኪዳን ወይ ንወንጌል የመልክት። ወንጌል ንኹሉ ዓለም ዝተዘርግሐን ንኹሉ ወዲ ሰብ ዝተኸፍተን ሰፊሕ መገዲ ድሕነት ስለ ዝኾነ በቲ ሰፊሕ ወገን ይምሰል።

እቲ ጸቢብ ወገን፦ ንብሉይ ኪዳን ንኦሪት   የመልክት። ብሉይ ኪዳን ንሓደ ህዝቢ   ንእስራኤል ጥራይ ዝተዋህበን፡ ምስ ሓድሽ ኪዳን ክነጻጸር ከሎ ድማ ጸቢብን ድሩትን ስለ ዝነበረ በቲ ጸቢብ ወገን ይምሰል።

ካልእ ትርጉሙ ድማ፤ እቲ ሰፊሕ ወገን ንመለኮት            እየሱስ ክርስቶስ ክምሰል ከሎ፡ እቲ ጸቢብ ወገን ድማ ንትሕትና ስጋዌኡ ወይ ንሰብኣውነቱ የመልክት።

እቲ ገመድ እቲ ኣጠማጥማን ቁጽሩን

እቲ ነቲ ቆርበት ሒዙ ዝጭብጥን ኣብ ዙርያ እቲ ዕንጨይቲ ዝጥምጠምን ናይ ቆርበት ገመድ ወይ ስልቲ ፍሉይ ምስጢር ኣለዎ።

ቁጽሪ እቲ ገመድ፦ እቲ ገመድ ተቆጺሩ ሰብዓን ክልተን 72 ግዜ እዩ ዝጥምጠም ወይ ዝሕለፍ። እዚ ድማ እየሱስ ክርስቶስ ንወንጌል ክሰብኩ ዝለኣኾም ሰብዓን ክልተን 72 ደቀ መዛሙርቲ የመልክት።

እቲ ዝወጽእ ድምጺ ድምጺ ምስጋና

ካብ ከበሮ ዝወጽእ ድምጺ ዝተፈላለዩ መንፈሳዊ ትርጉማት የጠቓልል፦

ቃል ወንጌል፦ ድምጺ ከበሮ ቃል ወንጌል ናብ ኣርባዕተ ኩርናዓት ዓለም ምዝርጋሑ የመልክት። ከምቲ ኣብ መዝሙር 19፡4 "ድምጾም ናብ ኵላ ምድሪ፡ ቃሎም ድማ ክሳዕ ወሰን ዓለም ወጸ" ተባሂሉ ተጻሒፉ ዘሎ፡ ድምጺ ከበሮ ድማ ንሰብ ካብ ድቃስ ሓጢኣት ንምብራህ ዝስማዕ ናይ ምስጋና ቃል እዩ።

ድምጺ መለኸት፦ ኣብ መወዳእታ ዘመን ጐይታ ንኹሉ ፍጥረት ንምትንሳእ ብድምጺ መለኸት መላእኽቲ ከም ዝመጽእ የመልክት።

ምስጋና መላእኽቲ፦ እቲ ድምጺ ምስ ጸናጽል ተወሃሂዱ ክስማዕ ከሎ፡ መላእኽቲ ኣብ ሰማይ "ቅዱስ ቅዱስ ቅዱስ" እናበሉ ዘቕርብዎ ምስጋና ምስሊ እዩ።


እቲ ቆርበት፦ ነቲ ጐይታና ምእንታና ዘውሃቦን ዝተገረፈሉን ቅዱስ ስጋኡ የመልክት።

ናይ ብሓቂ ይሰርሕ ድዩ ንዝብል ሕቶ
እወ ምጽዋት ሓጢኣት ከም ዝድምስስ ቃል ኣምላኽ ይምስክር እዩ
መጽሓፈ ጦቢት ምዕራፍ ኣርባዕተ ጥቕሲ ዓሰርተ ምጽዋት ካብ ሞት የድሕን ካብ ጸልማት እውን ይከላኸል ይብል

ሓደ ሰብ ብስም ሓደ ቅዱስ ወይ ብስም ሓደ ሙት ጽዋእ ማይ እንተ ኣስተየ ዓስቡ ኣይጠፍእን እዩ
ስለዚ እቲ ተስካር ነታ ነፍሲ ምሕረት ንኽትረክብ ኣብ ቅድሚ ኣምላኽ ዓቢ ዋጋ ኣለዎ

እቶም ካልኦት ወገናት ንተስካር ከም ድሕረት ወይ ከም ባእታ ገይሮም ብምርኣይ ካብ መጽሓፍ ቅዱስ የውጽኡዎ
ንሕና ግን ቃል ኣምላኽ ብዛዕባ እቲ ንሙታን ዝወሃብ ጸጋን ምጽዋትን ዝበሎ ካብ መጽሓፍ ቅዱስ እናጠቐስና ነረድእ

            { id: 25, title: "[ ምዕራፍ 25 • √ ፍትሓት ንነፍሲ ]", text: ` <h4>ፍትሓት ማለት ነታ ካብ ስጋ ዝተፈለየት ነፍሲ ካብ ማእሰርቲ ሓጢኣት ንኽትፈታሕን ኣብ ቅድሚ ኣምላኽ ምሕረት ንኽትረክብን ዝግበር ናይ ስንብት ጸሎት እዩ
እዚ ድማ ሰብ ዝፈጠሮ ዘይኮነስ መሰረቱ ካብቲ እየሱስ ክርስቶስ ንሃዋርያት ዝሃቦም ስልጣን ዝመጸ እዩ

ንሳቶም ዝብልዎ
እቶም ንዓና ዝቃወሙ ወገናት ሰብ ሓንሳብ ምስ ሞተ ፍርዲ እዩ እምበር ጸሎት ወይ ፍትሓት ኣየድልዮን እዩ ይብሉ
ነዚ ንምባል ድማ ኣብ መልእኽቲ እብራውያን ምዕራፍ ትሽዓተ ጥቕሲ ዕስራን ሸውዓተ ዘሎ ሰብ ሓንሳብ ክመውት ድሕሪኡ ድማ ፍርዲ እዩ ዝብል ቃል ይጠቅሱ
ንሳቶም ፍትሓት ንኣምላኽ ሓሳቡ ክቕይር ኣይክእልን እዩ ብምባል ነቲ ስርዓት የቃልሉዎ
ዝኾነ ሰብ ክጽልይ ይኽእል እዩ እምበር ፍሉይ ስልጣን ዘለዎ ካህን ኣየድልይን እዩ ዝብል ሓሳብ የቕርቡ

ካብ መጽሓፍ ቅዱስ ዝርከብ ጭብጢ
እቲ ቀዳማይ ጭብጢ ኣብ ወንጌል ማቴዎስ ምዕራፍ ዓሰርተ ሸሞንተ ጥቕሲ ዓሰርተ ሸሞንተ ይርከብ
እየሱስ ክርስቶስ ንሃዋርያቱ ኣብ ምድሪ ዝፈታሕኩምዎ ኩሉ ኣብ ሰማይ ፍቱሕ ክኸውን እዩ ኢሉ ስልጣን ሂብዎም
እዚ ስልጣን እዚ ንህያዋን ጥራይ ዘይኮነስ ንነፍሳት እውን ዝሰርሕ ሰማያዊ ስልጣን እዩ

ካልኣይ ጭብጢ ኣብ ካልኣይ መልእኽቲ ጢሞቴዎስ ምዕራፍ ሓደ ጥቕሲ ዓሰርተ ሸሞንተ ይርከብ

ኣልኣዛር ካብ ሞት ብጐይታ እዩ ተንሲኡ እቲ ናይ መግነዝ መእሰሪ ክፈትሑሉ ግን ንደቂ ሰባት ሂብዎም
እዚ ድማ ካህናት ነታ ነፍሲ ካብ ማእሰርቲ ሓጢኣት ንኽፈትሑ ስልጣን ከም ዘለዎም የመልክት

መን እዩ ፍትሓት ዝገብር
ፍትሓት ብካህናት ጥራይ እዩ ዝፍጸም
ዝኾነ ሰብ ፍትሓት ክገብር ኣይክእልን እዩ ምኽንያቱ እቲ ስልጣን ምስጢረ ክህነት ስለ ዘድልዮ
ካህናት ካብ ሃዋርያት ብኢድ ምንባር ዝወረሰዎ ስልጣን ስለ ዘለዎም ብስም እየሱስ ክርስቶስ ነታ ነፍሲ ይፈትሑዋ

ጥቕሚ ፍትሓት
ፍትሓት ነታ ነፍሲ ካብቲ ብሰንኪ ድኻም ስጋ ዝገበረቶ ሓጢኣት ክትፈታሕ ይሕግዛ

ፍትሓት ነታ ነፍሲ ሰላምን ዕረፍትን ይህባ

             { id: 26, title: "[ ምዕራፍ 26[•√ ዕጣን  ]", text: ` [ <h4>ዕጣን ኣብ ኦርቶዶክሳዊት ተዋህዶ ቤተ ክርስቲያን ንጸሎትናን ንኣምልኮናን ዝስኒ ቅዱስ መሳርሒ እዩ

ካብ መዓስን ብመንን ተጀሚሩ

        let currentFontSize = 16;
        const listDiv = document.getElementById('chapterList');
        const contentDiv = document.getElementById('chapterContent');
        const backBtn = document.getElementById('backBtn');
        const searchBox = document.getElementById('searchBox');
        const fontControls = document.getElementById('fontControls');
        const mainTitle = document.getElementById('mainTitle');

        function renderChapters(data) {
            listDiv.innerHTML = "";
            data.forEach(chapter => {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.innerHTML = `<h3>${chapter.title}</h3>`;
                card.onclick = () => showChapter(chapter.id);
                listDiv.appendChild(card);
            });
        }

        function filterChapters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = myBook.filter(c => c.title.toLowerCase().includes(term));
            renderChapters(filtered);
        }

        function showChapter(id) {
            const chapter = myBook.find(c => c.id === id);
            listDiv.style.display = 'none';
            searchBox.style.display = 'none';
            contentDiv.style.display = 'block';
            backBtn.style.display = 'block';
            fontControls.style.display = 'flex';
            mainTitle.style.display = 'none';

            let audioHtml = chapter.audio ? `<audio controls loop><source src="${chapter.audio}" type="audio/mpeg"></audio>` : "";
            let imagesHtml = "";
            if (chapter.images) {
                chapter.images.forEach(imgSrc => {
                    imagesHtml += `<img src="${imgSrc}" class="chapter-image">`;
                });
            }

            contentDiv.innerHTML = `
                <h2>${chapter.title}</h2>
                ${audioHtml}
                ${imagesHtml}
                <hr>
                <div class="content-text" id="contentText">${chapter.text}</div>
            `;
            document.getElementById('contentText').style.fontSize = currentFontSize + "px";
            window.scrollTo(0,0);
        }

        function showList() {
            const audio = document.querySelector('audio');
            if(audio) audio.pause();
            listDiv.style.display = 'block';
            searchBox.style.display = 'block';
            contentDiv.style.display = 'none';
            backBtn.style.display = 'none';
            fontControls.style.display = 'none';
            mainTitle.style.display = 'block';
        }

        function changeFontSize(delta) {
            currentFontSize += delta;
            if(currentFontSize < 12) currentFontSize = 12;
            if(currentFontSize > 40) currentFontSize = 40;
            const textDiv = document.getElementById('contentText');
            if(textDiv) textDiv.style.fontSize = currentFontSize + "px";
        }

        renderChapters(myBook);
